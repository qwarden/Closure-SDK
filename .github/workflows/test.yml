name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin and build extension
        run: |
          # Remove committed .so — it has a baked local path.
          # maturin develop builds a fresh one for this environment.
          rm -f closure_rs/closure_rs*.so
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin numpy pytest pytest-cov
          maturin develop --manifest-path rust/Cargo.toml
          # Copy freshly built .so into closure_rs/ where the shim expects it
          cp .venv/lib/python${{ matrix.python-version }}/site-packages/closure_rs/closure_rs*.so closure_rs/
        env:
          PYTHONNOUSERSITE: "1"

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -q --tb=short
        env:
          PYTHONNOUSERSITE: "1"

      - name: Coverage (Python 3.13 only)
        if: matrix.python-version == '3.13'
        run: |
          source .venv/bin/activate
          pytest tests/ --cov=closure_sdk --cov-report=term-missing -q
        env:
          PYTHONNOUSERSITE: "1"
